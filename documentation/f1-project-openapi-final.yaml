openapi: 3.0.3
info:
  title: API de Fórmula 1 Proyecto
  description: >
    API que permite gestionar pilotos, escuderías, circuitos y resultados de F1.
  version: 1.0.0

tags:
  - name: Drivers
  - name: Constructors
  - name: Circuits
  - name: Races
  - name: Seasons
  - name: Results
  - name: Standings
  - name: Qualifying
  - name: Lap Times
  - name: Pit Stops

paths:

  /drivers:
    get:
      tags:
        - Drivers
      summary: Get all drivers
      description: Returns a list of drivers with optional filters.
      parameters:
        - name: driverRef
          in: query
          schema:
            type: string
          description: Filter by driver reference
        - name: number
          in: query
          schema:
            type: integer
          description: Filter by driver number
        - name: code
          in: query
          schema:
            type: string
          description: Filter by driver code (e.g. HAM, VER)
        - name: forename
          in: query
          schema:
            type: string
          description: Filter by forename (partial match)
        - name: surname
          in: query
          schema:
            type: string
          description: Filter by surname (partial match)
        - name: dob
          in: query
          schema:
            type: string
            format: date
          description: Filter by date of birth
        - name: nationality
          in: query
          schema:
            type: string
          description: Filter by nationality
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Driver'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - Drivers
      summary: Create a new driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverInput'
            example:
              driverRef: hamilton
              number: 44
              code: HAM
              forename: Lewis
              surname: Hamilton
              dob: "1985-01-07"
              nationality: British
              url: "https://en.wikipedia.org/wiki/Lewis_Hamilton"
      responses:
        '201':
          description: Driver created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /drivers/{driverId}:
    parameters:
      - $ref: '#/components/parameters/driverId'
    get:
      tags:
        - Drivers
      summary: Get a specific driver by ID
      responses:
        '200':
          description: Driver details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags:
        - Drivers
      summary: Update an existing driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverInput'
      responses:
        '200':
          description: Driver updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Drivers
      summary: Delete a driver
      responses:
        '204':
          description: Driver deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /drivers/{driverId}/results:
    parameters:
      - $ref: '#/components/parameters/driverId'
    get:
      tags:
        - Drivers
      summary: Get race results for a driver
      parameters:
        - name: season
          in: query
          schema:
            type: integer
          description: Filter results by season year
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Race results for the driver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Result'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /drivers/{driverId}/standings:
    parameters:
      - $ref: '#/components/parameters/driverId'
    get:
      tags:
        - Drivers
      summary: Get championship standings for a driver
      parameters:
        - name: season
          in: query
          schema:
            type: integer
          description: Filter standings by season year
      responses:
        '200':
          description: Standing entries for the driver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverStanding'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /drivers/{driverId}/qualifying:
    parameters:
      - $ref: '#/components/parameters/driverId'
    get:
      tags:
        - Drivers
      summary: Get qualifying results for a driver
      parameters:
        - name: season
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Qualifying results for the driver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QualifyingResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /drivers/{driverId}/lap-times:
    parameters:
      - $ref: '#/components/parameters/driverId'
    get:
      tags:
        - Drivers
      summary: Get lap times for a driver
      parameters:
        - name: raceId
          in: query
          schema:
            type: integer
          description: Filter lap times by race ID
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lap time records for the driver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LapTime'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /drivers/{driverId}/pit-stops:
    parameters:
      - $ref: '#/components/parameters/driverId'
    get:
      tags:
        - Drivers
      summary: Get pit stop records for a driver
      parameters:
        - name: raceId
          in: query
          schema:
            type: integer
          description: Filter pit stops by race ID
      responses:
        '200':
          description: Pit stop records for the driver
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PitStop'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /constructors:
    get:
      tags:
        - Constructors
      summary: Get all constructors
      description: Returns a list of constructors with optional filters.
      parameters:
        - name: nationality
          in: query
          schema:
            type: string
          description: Filter by constructor nationality
        - name: name
          in: query
          schema:
            type: string
          description: Filter by constructor name (partial match)
        - name: constructorRef
          in: query
          schema:
            type: string
          description: Filter by constructor reference
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of constructors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Constructor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - Constructors
      summary: Create a new constructor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorInput'
      responses:
        '201':
          description: Constructor created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Constructor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /constructors/{constructorId}:
    parameters:
      - $ref: '#/components/parameters/constructorId'
    get:
      tags:
        - Constructors
      summary: Get a specific constructor by ID
      responses:
        '200':
          description: Constructor details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Constructor'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags:
        - Constructors
      summary: Update an existing constructor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConstructorInput'
      responses:
        '200':
          description: Constructor updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Constructor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Constructors
      summary: Delete a constructor
      responses:
        '204':
          description: Constructor deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /constructors/{constructorId}/results:
    parameters:
      - $ref: '#/components/parameters/constructorId'
    get:
      tags:
        - Constructors
      summary: Get race results for a constructor
      parameters:
        - name: raceId
          in: query
          schema:
            type: integer
          description: Filter results by race ID
        - name: points
          in: query
          schema:
            type: number
          description: Filter results by points
        - name: status
          in: query
          schema:
            type: string
          description: Filter results by status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Race results for the constructor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConstructorResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /constructors/{constructorId}/standings:
    parameters:
      - $ref: '#/components/parameters/constructorId'
    get:
      tags:
        - Constructors
      summary: Get championship standings for a constructor
      parameters:
        - name: season
          in: query
          schema:
            type: integer
          description: Filter standings by season year
      responses:
        '200':
          description: Constructor standing entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConstructorStanding'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /circuits:
    get:
      tags:
        - Circuits
      summary: Get all circuits
      parameters:
        - name: circuitRef
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of circuits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Circuit'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Circuit'
                xml:
                  name: circuits
                  wrapped: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - Circuits
      summary: Create a new circuit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitInput'
            example:
              circuitRef: monza
              name: Autodromo Nazionale di Monza
              location: Monza
              country: Italy
              lat: 45.6156
              lng: 9.2811
              alt: 162
              url: "https://en.wikipedia.org/wiki/Autodromo_Nazionale_Monza"
      responses:
        '201':
          description: Circuit created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Circuit'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /circuits/{circuitId}:
    parameters:
      - $ref: '#/components/parameters/circuitId'
    get:
      tags:
        - Circuits
      summary: Get a specific circuit by ID
      responses:
        '200':
          description: Circuit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Circuit'
            application/xml:
              schema:
                $ref: '#/components/schemas/Circuit'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags:
        - Circuits
      summary: Update an existing circuit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CircuitInput'
      responses:
        '200':
          description: Circuit updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Circuit'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Circuits
      summary: Delete a circuit
      responses:
        '204':
          description: Circuit deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /circuits/{circuitId}/races:
    parameters:
      - $ref: '#/components/parameters/circuitId'
    get:
      tags:
        - Circuits
        - Races
      summary: Get all races held at a circuit
      responses:
        '200':
          description: Races at this circuit
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Race'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /races:
    get:
      tags:
        - Races
      summary: Get all races
      parameters:
        - name: season
          in: query
          schema:
            type: integer
          description: Filter by season year
        - name: round
          in: query
          schema:
            type: integer
          description: Filter by round number
        - name: circuitId
          in: query
          schema:
            type: integer
          description: Filter by circuit ID
        - name: name
          in: query
          schema:
            type: string
          description: Filter by race name (partial match)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of races
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Race'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags:
        - Races
      summary: Create a new race
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RaceInput'
      responses:
        '201':
          description: Race created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Race'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /races/{raceId}:
    parameters:
      - name: raceId
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Races
      summary: Get a specific race by ID
      responses:
        '200':
          description: Race details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Race'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags:
        - Races
      summary: Update an existing race
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RaceInput'
      responses:
        '200':
          description: Race updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Race'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags:
        - Races
      summary: Delete a race
      responses:
        '204':
          description: Race deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /races/{raceId}/results:
    parameters:
      - name: raceId
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Races
        - Results
      summary: Get all results for a specific race
      responses:
        '200':
          description: Results for the race
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Result'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /seasons:
    get:
      tags:
        - Seasons
      summary: Get all seasons
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of all seasons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Season'
        '500':
          $ref: '#/components/responses/InternalError'

  /seasons/{year}:
    parameters:
      - $ref: '#/components/parameters/year'
    get:
      tags:
        - Seasons
      summary: Get a specific season by year
      responses:
        '200':
          description: Season details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Season'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /seasons/{year}/races:
    parameters:
      - $ref: '#/components/parameters/year'
    get:
      tags:
        - Seasons
        - Races
      summary: Get all races in a season
      responses:
        '200':
          description: Races in the season
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Race'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /results:
    get:
      tags:
        - Results
      summary: Get race results with filters
      parameters:
        - name: season
          in: query
          schema:
            type: integer
        - name: raceId
          in: query
          schema:
            type: integer
        - name: driverId
          in: query
          schema:
            type: integer
        - name: constructorId
          in: query
          schema:
            type: integer
        - name: position
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of race results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Result'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /results/{resultId}:
    parameters:
      - name: resultId
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Results
      summary: Get a single result by ID
      responses:
        '200':
          description: Result details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /standings/drivers:
    get:
      tags:
        - Standings
      summary: Get driver standings with filters
      parameters:
        - name: season
          in: query
          schema:
            type: integer
        - name: driverId
          in: query
          schema:
            type: integer
        - name: position
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Driver standings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DriverStanding'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /standings/constructors:
    get:
      tags:
        - Standings
      summary: Get constructor standings with filters
      parameters:
        - name: season
          in: query
          schema:
            type: integer
        - name: constructorId
          in: query
          schema:
            type: integer
        - name: position
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Constructor standings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConstructorStanding'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /qualifying:
    get:
      tags:
        - Qualifying
      summary: Get qualifying results with filters
      parameters:
        - name: season
          in: query
          schema:
            type: integer
        - name: raceId
          in: query
          schema:
            type: integer
        - name: driverId
          in: query
          schema:
            type: integer
        - name: constructorId
          in: query
          schema:
            type: integer
        - name: position
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Qualifying results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/QualifyingResult'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /qualifying/{qualifyId}:
    parameters:
      - name: qualifyId
        in: path
        required: true
        schema:
          type: integer
    get:
      tags:
        - Qualifying
      summary: Get a specific qualifying result by ID
      responses:
        '200':
          description: Qualifying result details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualifyingResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /lap-times:
    get:
      tags:
        - Lap Times
      summary: Get lap times with filters and pagination
      description: >
        Paginated
      parameters:
        - name: raceId
          in: query
          schema:
            type: integer
          description: Filter by race ID
        - name: driverId
          in: query
          schema:
            type: integer
          description: Filter by driver ID
        - name: lap
          in: query
          schema:
            type: integer
          description: Filter by lap number
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        '200':
          description: Lap time records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LapTime'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /pit-stops:
    get:
      tags:
        - Pit Stops
      summary: Get pit stop records with filters
      parameters:
        - name: raceId
          in: query
          schema:
            type: integer
        - name: driverId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Pit stop records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PitStop'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /external/current-season:
    get:
      tags:
        - Races
      summary: Fetch current season race schedule from OpenF1 API
      description: >
        OpenF1 API with F1 data
      responses:
        '200':
          description: Current season schedule (live or cached)
          content:
            application/json:
              schema:
                type: object
                properties:
                  source:
                    type: string
                    enum:
                      - live
                      - cached
                    description: Whether data came from  OpenF1 or the local cache
                  races:
                    type: array
                    items:
                      $ref: '#/components/schemas/Race'
        '500':
          $ref: '#/components/responses/InternalError'

  /external/driver/{driverRef}:
    get:
      tags:
        - Drivers
      summary: Fetch driver info from  OpenF1 API by driverRef
      description: >
        Calls  OpenF1 API
      parameters:
        - name: driverRef
          in: path
          required: true
          schema:
            type: string
          example: hamilton
      responses:
        '200':
          description: Driver data from  OpenF1 (or cache)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:

  parameters:
    driverId:
      name: driverId
      in: path
      required: true
      schema:
        type: integer
    constructorId:
      name: constructorId
      in: path
      required: true
      schema:
        type: integer
    circuitId:
      name: circuitId
      in: path
      required: true
      schema:
        type: integer
    year:
      name: year
      in: path
      required: true
      schema:
        type: integer
    round:
      name: round
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:

    Error:
      type: object
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: Resource not found

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 50
        total:
          type: integer
          example: 538121
        totalPages:
          type: integer
          example: 10763

    Driver:
      type: object
      xml:
        name: driver
      properties:
        driverId:
          type: integer
        driverRef:
          type: string
        number:
          type: integer
          nullable: true
        code:
          type: string
          nullable: true
        forename:
          type: string
        surname:
          type: string
        dob:
          type: string
          format: date
        nationality:
          type: string
        url:
          type: string
          format: uri

    DriverInput:
      type: object
      required:
        - driverRef
        - forename
        - surname
        - nationality
      properties:
        driverRef:
          type: string
        number:
          type: integer
          nullable: true
        code:
          type: string
          nullable: true
        forename:
          type: string
        surname:
          type: string
        dob:
          type: string
          format: date
        nationality:
          type: string
        url:
          type: string
          format: uri

    Constructor:
      type: object
      xml:
        name: constructor
      properties:
        constructorId:
          type: integer
        constructorRef:
          type: string
        name:
          type: string
        nationality:
          type: string
        url:
          type: string
          format: uri

    ConstructorInput:
      type: object
      required:
        - constructorRef
        - name
        - nationality
      properties:
        constructorRef:
          type: string
        name:
          type: string
        nationality:
          type: string
        url:
          type: string
          format: uri

    ConstructorResult:
      type: object
      properties:
        constructorResultId:
          type: integer
        raceId:
          type: integer
        constructorId:
          type: integer
        points:
          type: number
        status:
          type: string
          nullable: true

    ConstructorStanding:
      type: object
      properties:
        constructorStandingsId:
          type: integer
        raceId:
          type: integer
        constructorId:
          type: integer
        points:
          type: number
        position:
          type: integer
        positionText:
          type: string
        wins:
          type: integer

    Circuit:
      type: object
      xml:
        name: circuit
      properties:
        circuitId:
          type: integer
        circuitRef:
          type: string
        name:
          type: string
        location:
          type: string
        country:
          type: string
        lat:
          type: number
        lng:
          type: number
        alt:
          type: integer
          nullable: true
        url:
          type: string
          format: uri

    CircuitInput:
      type: object
      required:
        - circuitRef
        - name
        - location
        - country
        - lat
        - lng
      properties:
        circuitRef:
          type: string
        name:
          type: string
        location:
          type: string
        country:
          type: string
        lat:
          type: number
        lng:
          type: number
        alt:
          type: integer
          nullable: true
        url:
          type: string
          format: uri

    Season:
      type: object
      properties:
        year:
          type: integer
        url:
          type: string
          format: uri

    Race:
      type: object
      properties:
        raceId:
          type: integer
        year:
          type: integer
        round:
          type: integer
        circuitId:
          type: integer
        name:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          nullable: true
        url:
          type: string
          format: uri

    RaceInput:
      type: object
      required:
        - year
        - round
        - circuitId
        - name
        - date
      properties:
        year:
          type: integer
        round:
          type: integer
        circuitId:
          type: integer
        name:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
          nullable: true
        url:
          type: string
          format: uri

    Result:
      type: object
      properties:
        resultId:
          type: integer
        raceId:
          type: integer
        driverId:
          type: integer
        constructorId:
          type: integer
        number:
          type: integer
          nullable: true
        grid:
          type: integer
        position:
          type: integer
          nullable: true
        positionText:
          type: string
        positionOrder:
          type: integer
        points:
          type: number
        laps:
          type: integer
        time:
          type: string
          nullable: true
        milliseconds:
          type: integer
          nullable: true
        fastestLap:
          type: integer
          nullable: true
        rank:
          type: integer
          nullable: true
        fastestLapTime:
          type: string
          nullable: true
        fastestLapSpeed:
          type: string
          nullable: true
        statusId:
          type: integer

    DriverStanding:
      type: object
      properties:
        driverStandingsId:
          type: integer
        raceId:
          type: integer
        driverId:
          type: integer
        points:
          type: number
        position:
          type: integer
        positionText:
          type: string
        wins:
          type: integer

    QualifyingResult:
      type: object
      properties:
        qualifyId:
          type: integer
        raceId:
          type: integer
        driverId:
          type: integer
        constructorId:
          type: integer
        number:
          type: integer
        position:
          type: integer
        q1:
          type: string
          nullable: true
        q2:
          type: string
          nullable: true
        q3:
          type: string
          nullable: true

    LapTime:
      type: object
      properties:
        raceId:
          type: integer
        driverId:
          type: integer
        lap:
          type: integer
        position:
          type: integer
        time:
          type: string
        milliseconds:
          type: integer

    PitStop:
      type: object
      properties:
        raceId:
          type: integer
        driverId:
          type: integer
        stop:
          type: integer
        lap:
          type: integer
        time:
          type: string
        duration:
          type: string
        milliseconds:
          type: integer